name: Postman API Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL de la API'
        required: false
        default: 'https://endpoints-fast-api.onrender.com/'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Instalar Newman y reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra
    
    - name: Verificar instalación
      run: newman -v
    
    - name: Ejecutar tests de Postman
      id: run_tests
      continue-on-error: true
      env:
        BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:8000' }}
      run: python scripts/execute-tests.py --base-url=$BASE_URL
    
    - name: Obtener timestamp de la ejecución
      id: get_timestamp
      if: always()
      run: |
        if [ -f docs/.last_run.txt ]; then
          TIMESTAMP=$(cat docs/.last_run.txt)
        else
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        fi
        echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
    
    - name: Subir reporte como artefacto
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: run_${{ steps.get_timestamp.outputs.timestamp }}
        path: results/run_${{ steps.get_timestamp.outputs.timestamp }}/
        retention-days: 30
    
    - name: 💾 Commit report to repository
      if: always()
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add docs/

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update Newman report - run ${{ github.run_number }}"
          git push
        fi

    - name: 🧹 Limpiar Docker
      if: always()
      run: docker system prune -f